<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国移动福利分类领取</title>
    <style>
        /* 现代化分类设计 */
        :root {
            --flow-color: #1a73e8;
            --flow-light: rgba(26, 115, 232, 0.1);
            --call-color: #0d9d58;
            --call-light: rgba(13, 157, 88, 0.1);
            --cash-color: #f9ab00;
            --cash-light: rgba(249, 171, 0, 0.1);
            --other-color: #673ab7;
            --other-light: rgba(103, 58, 183, 0.1);
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text: #202124;
            --text-light: #5f6368;
            --border: #dadce0;
            --radius: 12px;
            --shadow: 0 2px 6px rgba(0,0,0,0.05);
            --shadow-hover: 0 8px 25px rgba(0,0,0,0.12);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-color);
            color: var(--text);
            line-height: 1.5;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 顶部区域 */
        .header {
            text-align: center;
            padding: 30px 20px 20px;
        }
        
        h1 {
            font-size: 2rem;
            color: var(--text);
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .subtitle {
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 25px;
        }
        
        /* 分类标签 */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 12px 24px;
            background: white;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tab:hover {
            transform: translateY(-3px);
        }
        
        .tab.active {
            color: white;
        }
        
        .tab-flow { border: 2px solid var(--flow-color); color: var(--flow-color); }
        .tab-flow.active { background: var(--flow-color); }
        
        .tab-cash { border: 2px solid var(--cash-color); color: var(--cash-color); }
        .tab-cash.active { background: var(--cash-color); }
        
        .tab-other { border: 2px solid var(--other-color); color: var(--other-color); }
        .tab-other.active { background: var(--other-color); }
        
        .tab-count {
            background: rgba(0,0,0,0.1);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
        }
        
        .active .tab-count {
            background: rgba(255,255,255,0.3);
        }
        
        /* 分类内容区域 */
        .category-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        .category-section.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }
        
        .header-flow { border-color: var(--flow-color); }
        .header-cash { border-color: var(--cash-color); }
        .header-other { border-color: var(--other-color); }
        
        .category-title {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .title-flow { color: var(--flow-color); }
        .title-cash { color: var(--cash-color); }
        .title-other { color: var(--other-color); }
        
        .category-count {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        
        /* 搜索筛选 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
        }
        
        .search-btn {
            padding: 12px 20px;
            background: var(--flow-color);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
        }
        
        /* 活动网格 */
        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        /* 活动卡片 */
        .activity-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }
        
        .activity-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        
        /* 卡片顶部 */
        .card-header {
            padding: 20px 20px 15px;
        }
        
        .card-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
        }
        
        .card-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-flow { background: var(--flow-light); color: var(--flow-color); }
        .badge-call { background: var(--call-light); color: var(--call-color); }
        .badge-cash { background: var(--cash-light); color: var(--cash-color); }
        .badge-other { background: var(--other-light); color: var(--other-color); }
        
        /* 领取内容 */
        .card-content {
            text-align: center;
            padding: 15px 20px;
            margin: 0 20px 15px;
            border-radius: 8px;
        }
        
        .content-flow { background: var(--flow-light); }
        .content-call { background: var(--call-light); }
        .content-cash { background: var(--cash-light); }
        .content-other { background: var(--other-light); }
        
        .content-amount {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .amount-flow { color: var(--flow-color); }
        .amount-call { color: var(--call-color); }
        .amount-cash { color: var(--cash-color); }
        .amount-other { color: var(--other-color); }
        
        .content-desc {
            font-size: 1rem;
            color: var(--text-light);
        }
        
        /* 详细信息 */
        .card-details {
            padding: 0 20px 20px;
        }
        
        .detail-item {
            display: flex;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .detail-label {
            width: 60px;
            color: var(--text-light);
        }
        
        .detail-value {
            color: var(--text);
            font-weight: 500;
        }
        
        /* 按钮区域 */
        .card-footer {
            padding: 0 20px 20px;
        }
        
        .card-note {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 15px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.02);
            border-radius: 6px;
        }
        
        .btn-go {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--flow-color);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .btn-go:hover {
            background: #0d62d9;
            transform: translateY(-2px);
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 25px 20px;
            color: var(--text-light);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }
        
        .update-time {
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(26, 115, 232, 0.1);
            border-top: 3px solid var(--flow-color);
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 无结果提示 */
        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-style: italic;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .activities-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .tabs-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .category-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .search-box {
                flex-direction: column;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .content-amount {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 中国移动福利分类领取</h1>
            <p class="subtitle">按类别查找，快速领取流量、话费及其他福利</p>
        </div>
        
        <!-- 分类标签 -->
        <div class="tabs-container">
            <div class="tab tab-flow active" data-category="flow">
                <span>流量专区</span>
                <span class="tab-count" id="flow-count">0</span>
            </div>
            <div class="tab tab-cash" data-category="cash">
                <span>话费专区</span>
                <span class="tab-count" id="cash-count">0</span>
            </div>
            <div class="tab tab-other" data-category="other">
                <span>其他专区</span>
                <span class="tab-count" id="other-count">0</span>
            </div>
        </div>
        
        <main>
            <!-- 流量专区 -->
            <div class="category-section active" id="flow-section">
                <div class="category-header header-flow">
                    <h2 class="category-title title-flow">📶 流量专区</h2>
                    <div class="category-count" id="flow-count-text">共 0 个活动</div>
                </div>
                
                <div class="search-box">
                    <input type="text" class="search-input" id="flow-search" placeholder="搜索流量活动...">
                    <button class="search-btn" onclick="searchInCategory('flow')">搜索</button>
                </div>
                
                <div class="activities-grid" id="flow-activities">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>正在加载流量活动...</p>
                    </div>
                </div>
            </div>
            
            <!-- 话费专区 -->
            <div class="category-section" id="cash-section">
                <div class="category-header header-cash">
                    <h2 class="category-title title-cash">💰 话费专区</h2>
                    <div class="category-count" id="cash-count-text">共 0 个活动</div>
                </div>
                
                <div class="search-box">
                    <input type="text" class="search-input" id="cash-search" placeholder="搜索话费活动...">
                    <button class="search-btn" onclick="searchInCategory('cash')">搜索</button>
                </div>
                
                <div class="activities-grid" id="cash-activities">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>正在加载话费活动...</p>
                    </div>
                </div>
            </div>
            
            <!-- 其他专区 -->
            <div class="category-section" id="other-section">
                <div class="category-header header-other">
                    <h2 class="category-title title-other">🎯 其他专区</h2>
                    <div class="category-count" id="other-count-text">共 0 个活动</div>
                </div>
                
                <div class="search-box">
                    <input type="text" class="search-input" id="other-search" placeholder="搜索其他活动...">
                    <button class="search-btn" onclick="searchInCategory('other')">搜索</button>
                </div>
                
                <div class="activities-grid" id="other-activities">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>正在加载其他活动...</p>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>本页面仅汇总中国移动官方及合作方福利活动链接</p>
            <p>活动最终解释权归中国移动及相关活动方所有</p>
            <div class="update-time" id="update-time"></div>
        </footer>
    </div>

    <script>
        // 全局变量存储活动数据
        let allActivities = [];
        let filteredActivities = {
            flow: [],
            cash: [],
            other: []
        };
        
        // 从data.json加载活动数据
        async function loadActivities() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                allActivities = data.activities;
                
                // 分类活动
                categorizeActivities(allActivities);
                
                // 显示默认分类（流量专区）
                displayActivitiesByCategory('flow');
                
                // 更新页面时间
                const now = new Date();
                const timeStr = `最后更新: ${data.lastUpdate} | 加载时间: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
                document.getElementById('update-time').textContent = timeStr;
                
                // 为搜索框添加回车键支持
                setupSearchInputs();
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.querySelectorAll('.activities-grid').forEach(grid => {
                    grid.innerHTML = '<div class="loading">数据加载失败，请确保data.json文件存在</div>';
                });
            }
        }
        
        // 分类活动
        function categorizeActivities(activities) {
            // 重置分类
            filteredActivities = {
                flow: [],
                cash: [],
                other: []
            };
            
            // 统计各类活动数量
            let flowCount = 0, cashCount = 0, otherCount = 0;
            
            activities.forEach(activity => {
                // 根据type分类
                if (activity.type === '流量') {
                    filteredActivities.flow.push(activity);
                    flowCount++;
                } else if (activity.type === '话费') {
                    filteredActivities.cash.push(activity);
                    cashCount++;
                } else {
                    // 通话、办卡等其他类型都归到"其他"
                    filteredActivities.other.push(activity);
                    otherCount++;
                }
            });
            
            // 更新标签计数
            document.getElementById('flow-count').textContent = flowCount;
            document.getElementById('cash-count').textContent = cashCount;
            document.getElementById('other-count').textContent = otherCount;
            
            // 更新分类标题计数
            document.getElementById('flow-count-text').textContent = `共 ${flowCount} 个活动`;
            document.getElementById('cash-count-text').textContent = `共 ${cashCount} 个活动`;
            document.getElementById('other-count-text').textContent = `共 ${otherCount} 个活动`;
        }
        
        // 显示指定分类的活动
        function displayActivitiesByCategory(category, searchTerm = '') {
            const containerId = `${category}-activities`;
            const container = document.getElementById(containerId);
            
            // 获取该分类的活动
            let activities = filteredActivities[category];
            
            // 如果有搜索词，进行筛选
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                activities = activities.filter(activity => 
                    activity.title.toLowerCase().includes(term) ||
                    activity.content.toLowerCase().includes(term) ||
                    activity.note.toLowerCase().includes(term) ||
                    activity.amount.toLowerCase().includes(term)
                );
            }
            
            // 清空容器
            container.innerHTML = '';
            
            // 如果没有活动
            if (activities.length === 0) {
                container.innerHTML = '<div class="no-results">未找到匹配的活动</div>';
                return;
            }
            
            // 显示活动卡片
            activities.forEach(activity => {
                const card = createActivityCard(activity, category);
                container.appendChild(card);
            });
        }
        
        // 创建活动卡片
        function createActivityCard(activity, category) {
            // 确定卡片样式
            let badgeClass = '', contentClass = '', amountClass = '';
            
            if (activity.type === '流量') {
                badgeClass = 'badge-flow';
                contentClass = 'content-flow';
                amountClass = 'amount-flow';
            } else if (activity.type === '通话') {
                badgeClass = 'badge-call';
                contentClass = 'content-call';
                amountClass = 'amount-call';
            } else if (activity.type === '话费') {
                badgeClass = 'badge-cash';
                contentClass = 'content-cash';
                amountClass = 'amount-cash';
            } else {
                badgeClass = 'badge-other';
                contentClass = 'content-other';
                amountClass = 'amount-other';
            }
            
            const card = document.createElement('div');
            card.className = 'activity-card';
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title-row">
                        <div class="card-title">${activity.title}</div>
                        <div class="card-badge ${badgeClass}">${activity.type}</div>
                    </div>
                </div>
                
                <div class="card-content ${contentClass}">
                    <div class="content-amount ${amountClass}">${activity.amount}</div>
                    <div class="content-desc">${activity.content}</div>
                </div>
                
                <div class="card-details">
                    <div class="detail-item">
                        <span class="detail-label">有效期:</span>
                        <span class="detail-value">${activity.validity}</span>
                    </div>
                </div>
                
                <div class="card-footer">
                    <div class="card-note">${activity.note}</div>
                    <a href="${activity.link}" target="_blank" class="btn-go">立即领取</a>
                </div>
            `;
            
            return card;
        }
        
        // 切换分类标签
        function switchCategory(category) {
            // 更新标签状态
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.tab-${category}`).classList.add('active');
            
            // 更新内容区域
            document.querySelectorAll('.category-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(`${category}-section`).classList.add('active');
            
            // 显示该分类的活动
            const searchInput = document.getElementById(`${category}-search`);
            displayActivitiesByCategory(category, searchInput.value);
        }
        
        // 在分类内搜索
        function searchInCategory(category) {
            const searchInput = document.getElementById(`${category}-search`);
            displayActivitiesByCategory(category, searchInput.value);
        }
        
        // 设置搜索框回车键支持
        function setupSearchInputs() {
            ['flow-search', 'cash-search', 'other-search'].forEach(inputId => {
                const input = document.getElementById(inputId);
                input.addEventListener('keypress', function(event) {
                    if (event.key === 'Enter') {
                        const category = inputId.split('-')[0];
                        searchInCategory(category);
                    }
                });
            });
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            loadActivities();
            
            // 绑定标签点击事件
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const category = this.getAttribute('data-category');
                    switchCategory(category);
                });
            });
        });
    </script>
</body>
</html>
