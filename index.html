<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国移动流量活动导航</title>
    <style>
        /* 基础样式 */
        :root {
            --primary: #157efb;
            --primary-dark: #0a5ec9;
            --secondary: #f0f7ff;
            --accent: #ff6b6b;
            --text: #333;
            --text-light: #666;
            --border: #e1e8f0;
            --card-bg: #fff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 20px rgba(0, 0, 0, 0.12);
            --radius: 10px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: linear-gradient(135deg, #f5f9ff 0%, #e8f1ff 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 头部 */
        header {
            text-align: center;
            padding: 2rem 1.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 1rem;
        }
        
        /* 统计信息 */
        .stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        /* 活动网格 */
        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        /* 活动卡片 */
        .activity-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border);
        }
        
        .activity-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        
        .card-header {
            padding: 1.2rem 1.2rem 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-badge {
            background: linear-gradient(135deg, var(--accent), #ff8e8e);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .card-body {
            padding: 0 1.2rem 1rem;
        }
        
        .card-content {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }
        
        .card-note {
            font-size: 0.85rem;
            color: #888;
        }
        
        .card-footer {
            padding: 0 1.2rem 1.2rem;
        }
        
        .visit-btn {
            display: block;
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .visit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(21, 126, 251, 0.3);
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-light);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .activities-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .stats {
                gap: 1rem;
            }
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(21, 126, 251, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">📱</div>
            <h1>中国移动流量活动导航</h1>
            <p class="subtitle">一键直达 | 实时更新 | 手机电脑通用</p>
            
            <div class="stats">
                <div class="stat-item">
                    <span>活动数量: </span>
                    <strong id="activity-count">0</strong>
                </div>
                <div class="stat-item">
                    <span>最后更新: </span>
                    <strong id="update-date">2024-01-01</strong>
                </div>
            </div>
        </header>
        
        <main>
            <div id="activities-list" class="activities-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载活动数据...</p>
                </div>
            </div>
        </main>
        
        <footer>
            <p>© 2024 中国移动流量活动导航 | 本页面仅作导航用途</p>
            <p style="margin-top: 0.5rem; font-size: 0.8rem; color: #999;">数据来源: data.json | 无外部依赖</p>
        </footer>
    </div>

    <script>
        // 加载并显示活动数据
        async function loadActivities() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                // 更新统计信息
                document.getElementById('activity-count').textContent = data.activities.length;
                document.getElementById('update-date').textContent = data.lastUpdate;
                
                // 显示活动
                displayActivities(data.activities);
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('activities-list').innerHTML = 
                    '<div class="loading">加载数据失败，请确保data.json文件存在</div>';
            }
        }
        
        // 显示活动卡片
        function displayActivities(activities) {
            const container = document.getElementById('activities-list');
            container.innerHTML = '';
            
            activities.forEach(activity => {
                const card = document.createElement('div');
                card.className = 'activity-card';
                
                // 根据活动类型设置徽章
                let badgeText = "官方活动";
                if (activity.note.includes("短链接")) badgeText = "快速直达";
                if (activity.note.includes("流量卡")) badgeText = "办卡专区";
                if (activity.title.includes("河南")) badgeText = "地区专享";
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">${activity.title}</div>
                        <div class="card-badge">${badgeText}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-content">${activity.content}</div>
                        <div class="card-note">${activity.note}</div>
                    </div>
                    <div class="card-footer">
                        <a href="${activity.link}" target="_blank" class="visit-btn">立即领取</a>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadActivities);
    </script>
</body>
</html>
