<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国移动福利领取中心</title>
    <style>
        /* 现代化简洁设计 */
        :root {
            --flow-color: #1a73e8;
            --call-color: #0d9d58; 
            --cash-color: #f9ab00;
            --card-color: #673ab7;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text: #202124;
            --text-light: #5f6368;
            --border: #dadce0;
            --radius: 12px;
            --shadow: 0 2px 6px rgba(0,0,0,0.05);
            --shadow-hover: 0 8px 25px rgba(26,115,232,0.12);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-color);
            color: var(--text);
            line-height: 1.5;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 顶部区域 */
        .header {
            text-align: center;
            padding: 30px 20px 20px;
        }
        
        h1 {
            font-size: 2rem;
            color: var(--text);
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .subtitle {
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 25px;
        }
        
        /* 统计卡片 */
        .stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .stat-item {
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            color: var(--text-light);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-value {
            font-weight: 600;
            color: var(--flow-color);
        }
        
        /* 活动网格 */
        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        /* 活动卡片 */
        .activity-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }
        
        .activity-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        
        /* 根据类型设置顶部颜色 */
        .card-type-flow { border-top: 4px solid var(--flow-color); }
        .card-type-call { border-top: 4px solid var(--call-color); }
        .card-type-cash { border-top: 4px solid var(--cash-color); }
        .card-type-card { border-top: 4px solid var(--card-color); }
        
        .card-header {
            padding: 20px 20px 15px;
        }
        
        .card-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
        }
        
        .card-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-flow { background: rgba(26, 115, 232, 0.1); color: var(--flow-color); }
        .badge-call { background: rgba(13, 157, 88, 0.1); color: var(--call-color); }
        .badge-cash { background: rgba(249, 171, 0, 0.1); color: var(--cash-color); }
        .badge-card { background: rgba(103, 58, 183, 0.1); color: var(--card-color); }
        
        /* 领取内容展示 */
        .card-content {
            text-align: center;
            padding: 15px 20px;
            background: linear-gradient(135deg, #f8f9ff, #f0f3ff);
            margin: 0 20px 15px;
            border-radius: 8px;
        }
        
        .content-amount {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .amount-flow { color: var(--flow-color); }
        .amount-call { color: var(--call-color); }
        .amount-cash { color: var(--cash-color); }
        .amount-card { color: var(--card-color); }
        
        .content-desc {
            font-size: 1rem;
            color: var(--text-light);
        }
        
        /* 详细信息 */
        .card-details {
            padding: 0 20px 20px;
        }
        
        .detail-item {
            display: flex;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .detail-label {
            width: 60px;
            color: var(--text-light);
        }
        
        .detail-value {
            color: var(--text);
            font-weight: 500;
        }
        
        /* 按钮区域 */
        .card-footer {
            padding: 0 20px 20px;
        }
        
        .card-note {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 15px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.02);
            border-radius: 6px;
        }
        
        .btn-go {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--flow-color);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .btn-go:hover {
            background: #0d62d9;
            transform: translateY(-2px);
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 25px 20px;
            color: var(--text-light);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }
        
        .update-time {
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(26, 115, 232, 0.1);
            border-top: 3px solid var(--flow-color);
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .activities-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .stats {
                flex-direction: column;
                align-items: center;
            }
            
            .stat-item {
                width: 100%;
                max-width: 300px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .content-amount {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 中国移动福利领取</h1>
            <p class="subtitle">领取流量、通话、话费，每日更新可用活动</p>
            
            <div class="stats">
                <div class="stat-item">
                    <span>活动总数:</span>
                    <span class="stat-value" id="total-count">0</span>
                </div>
                <div class="stat-item">
                    <span>今日更新:</span>
                    <span class="stat-value" id="today-date">2024-05-01</span>
                </div>
                <div class="stat-item">
                    <span>状态:</span>
                    <span class="stat-value">正常</span>
                </div>
            </div>
        </div>
        
        <main>
            <div id="activities-list" class="activities-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载福利活动...</p>
                </div>
            </div>
        </main>
        
        <footer>
            <p>本页面仅汇总中国移动官方及合作方福利活动链接</p>
            <p>活动最终解释权归中国移动及相关活动方所有</p>
            <div class="update-time" id="update-time"></div>
        </footer>
    </div>

    <script>
        // 从data.json加载活动数据
        async function loadActivities() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                // 更新统计信息
                document.getElementById('total-count').textContent = data.activities.length;
                document.getElementById('today-date').textContent = data.lastUpdate;
                
                // 显示活动
                displayActivities(data.activities);
                
                // 更新页面时间
                const now = new Date();
                const timeStr = `最后加载: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
                document.getElementById('update-time').textContent = timeStr;
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('activities-list').innerHTML = 
                    '<div class="loading">数据加载失败，请确保data.json文件存在</div>';
            }
        }
        
        // 显示活动卡片
        function displayActivities(activities) {
            const container = document.getElementById('activities-list');
            container.innerHTML = '';
            
            // 按类型统计
            let flowCount = 0, callCount = 0, cashCount = 0, cardCount = 0;
            
            activities.forEach(activity => {
                // 统计各类活动数量
                if (activity.type === '流量') flowCount++;
                else if (activity.type === '通话') callCount++;
                else if (activity.type === '话费') cashCount++;
                else if (activity.type === '办卡') cardCount++;
                
                // 确定卡片样式类
                let typeClass = '', badgeClass = '', amountClass = '';
                if (activity.type === '流量') {
                    typeClass = 'card-type-flow';
                    badgeClass = 'badge-flow';
                    amountClass = 'amount-flow';
                } else if (activity.type === '通话') {
                    typeClass = 'card-type-call';
                    badgeClass = 'badge-call';
                    amountClass = 'amount-call';
                } else if (activity.type === '话费') {
                    typeClass = 'card-type-cash';
                    badgeClass = 'badge-cash';
                    amountClass = 'amount-cash';
                } else if (activity.type === '办卡') {
                    typeClass = 'card-type-card';
                    badgeClass = 'badge-card';
                    amountClass = 'amount-card';
                }
                
                const card = document.createElement('div');
                card.className = `activity-card ${typeClass}`;
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title-row">
                            <div class="card-title">${activity.title}</div>
                            <div class="card-badge ${badgeClass}">${activity.type}</div>
                        </div>
                    </div>
                    
                    <div class="card-content">
                        <div class="content-amount ${amountClass}">${activity.amount}</div>
                        <div class="content-desc">${activity.content}</div>
                    </div>
                    
                    <div class="card-details">
                        <div class="detail-item">
                            <span class="detail-label">有效期:</span>
                            <span class="detail-value">${activity.validity}</span>
                        </div>
                    </div>
                    
                    <div class="card-footer">
                        <div class="card-note">${activity.note}</div>
                        <a href="${activity.link}" target="_blank" class="btn-go">立即领取</a>
                    </div>
                `;
                
                container.appendChild(card);
            });
            
            // 更新统计显示
            document.querySelectorAll('.stat-item')[0].innerHTML = 
                `<span>活动总数:</span><span class="stat-value">${activities.length}</span>`;
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadActivities);
    </script>
</body>
</html>
