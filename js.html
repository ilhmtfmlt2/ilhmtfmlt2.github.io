<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查询排行榜</title>
    <style>
        /* 共享的样式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            color: #333;
            margin-top: 20px;
        }

        /* 表格样式 */
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            border-radius: 5px;
            overflow: hidden;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #3498db;
            color: #fff;
        }

        /* 筛选条件样式 */
        #filterOptions {
            margin: 20px auto;
            width: 80%;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
            padding: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        #filterOptions input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            margin-right: 10px;
        }

        #filterOptions button {
            padding: 10px 20px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        #filterOptions button:hover {
            background-color: #0073e6;
        }
    </style>
</head>
<body>
    <h1>排行榜</h1>
    <div id="filterOptions">
        <label for="searchInput">搜索玩家：</label>
        <input type="text" id="searchInput" class="filter-input">
        <button type="button" onclick="searchLeaderboard()">搜索</button>
        <button type="button" onclick="clearSearch()">清除搜索</button>
    </div>
    <div id="result">
        <!-- 排行榜表格 -->
        <table>
            <thead>
                <tr>
                    <th>排名</th>
                    <th>玩家</th>
                    <th>分数</th>
                </tr>
            </thead>
            <tbody id="leaderboardData">

    </div>

        function displayLeaderboard(data) {
            const leaderboardDataElement = document.getElementById("leaderboardData");
            leaderboardDataElement.innerHTML = "";

            data.forEach(entry => {
                const row = document.createElement("tr");
                const fields = ["rank", "player", "score"];

                fields.forEach(fieldName => {
                    const cell = document.createElement("td");
                    cell.textContent = entry[fieldName];
                    row.appendChild(cell);
                });

                leaderboardDataElement.appendChild(row);
            });
        }

        function searchLeaderboard() {
            const searchInput = document.getElementById("searchInput").value.toLowerCase();
            const filteredData = leaderboardData.filter(entry => entry.player.toLowerCase().includes(searchInput));
            displayLeaderboard(filteredData);
        }

        function clearSearch() {
            document.getElementById("searchInput").value = "";
            displayLeaderboard(leaderboardData);
        }
        
        // 页面加载后默认显示排行榜
        window.onload = function() {
            // 初始加载时按分数高低排序
            leaderboardData = leaderboardData.sort((a, b) => b.score - a.score);
            displayLeaderboard(leaderboardData);
        };
    </script>
